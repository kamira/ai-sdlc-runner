# ai-sdlc-runner configuration
# The contract surface is the *skill's stable output*, not Claude Code's current
# runtime behavior. Runtime limits (nesting/concurrency) live here and are
# probed at startup; if the platform changes, change this file — never the contract.

# Contract version the runner expects (major.minor is locked per project).
# This is the *expected* version; the *actual* version is detected at runtime by
# reading the skill's SKILL.md frontmatter (contract.read_skill_version).
contract_version: "1.0.0"

# Primary skill source: a local, offline, multi-version store (CHG-20260617-05).
# Each subdir (v1.0.0, v1.1.0, ...) is a full skill root. The runner auto-selects the
# version matching a project's lock major.minor; first run uses contract_version.
skill_store: "./skills"

# Fallback skill path, used only when skill_store has no suitable version and no
# --skill-path override is given. Normally the optional git submodule (default not pulled).
skill_path: "./ai-skills/skills/ai-sdlc"

# Shallow fan-out limits. Platform may support more; kept conservative on purpose
# to save tokens. Probed at startup; run is degraded/halted if unmet.
concurrency_max: 4        # subscription sweet spot 3-5
nesting_depth_max: 3      # platform supports 5; deliberately conservative

# Agent-execution backend (runtime concern, not the contract). Platform-agnostic:
# run via an HTTP API or a subscription/CLI agent. Default `stub` = offline/dry-run.
# Secrets (API keys) are read from the named ENVIRONMENT VARIABLE, never stored here.
executor:
  backend: stub                 # stub | command | api  (override per-run with --backend)
  # command: any local CLI agent (e.g. a logged-in subscription tool)
  command:
    argv: ["claude", "-p"]      # base command; the agent prompt is added per `prompt_via`
    prompt_via: stdin           # stdin | arg
    timeout: 600
  # api: any HTTP endpoint; provider adapter shapes the request/response
  api:
    provider: generic           # anthropic | openai | generic
    base_url: ""                # e.g. https://api.anthropic.com/v1/messages
    model: ""                   # e.g. a model name your platform exposes
    api_key_env: "AI_SDLC_API_KEY"   # name of the env var holding the key
    timeout: 120
